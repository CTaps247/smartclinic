name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # If your backend is in a subfolder (important for labs)
    - name: Change to backend directory
      run: cd ./

    # Use Maven Wrapper (required by grader)
    - name: Build backend with Maven
      run: ./mvnw clean compile
