name: Java CI with Maven

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Java 17 environment
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      # Build backend (IMPORTANT: explicit backend directory)
      - name: Build backend
        working-directory: src/main
        run: mvn clean compile

      # Run tests
      - name: Run tests
        working-directory: src/main
        run: mvn test
