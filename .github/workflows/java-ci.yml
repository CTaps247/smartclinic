name: Java CI with Maven

on:
push:
branches: ["main"]
pull_request:
branches: ["main"]

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  # Checkout repository
  - name: Checkout code
    uses: actions/checkout@v4

  # Set up Java 17 environment
  - name: Set up JDK 17
    uses: actions/setup-java@v4
    with:
      java-version: "17"
      distribution: "temurin"
      cache: maven

  # Build backend application
  # (Explicit working directory ensures correct module compilation)
  - name: Build backend
    working-directory: .
    run: mvn clean compile

  # Run unit tests
  - name: Run tests
    working-directory: .
    run: mvn test
```
